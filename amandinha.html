<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguém Especial ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #btn-sim {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #btn-sim:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #btn-nao {
            background-color: #6c757d;
            color: white;
            position: absolute; /* Necessário para o JavaScript mover o botão */
            left: calc(50% + 10px); /* Alinhamento inicial ao lado do Sim */
            transition: all 0.2s ease;
        }

        /* Tela de Sucesso */
        .hidden {
            display: none;
        }

        .sucesso h2 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .sucesso p {
            color: #590d22;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .emoji-hearts {
            font-size: 3.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Tela Principal -->
    <div class="container" id="painel-principal">
        <h1 id="pergunta">Quer ser a minha eterna namorada? ❤️</h1>
        <div class="btn-container">
            <button id="btn-sim" onclick="aceitou()">SIM</button>
            <button id="btn-nao" onmouseover="foge()" onclick="foge()" ontouchstart="foge()">NÃO</button>
        </div>
    </div>

    <!-- Tela de Sucesso (Oculta no início) -->
    <div class="container hidden" id="painel-sucesso">
        <div class="sucesso">
            <div class="emoji-hearts">❤️</div>
            <h2>Sabia que diria SIM!</h2>
            <p>Você me faz a mulher mais feliz do mundo meu momo. 🥰</p>
            <p>Obrigada pelo seu cuidado comigo, sua compreensão e por sempre me apoiar! Espero que esse seja o primeiro mês de muitos que virão ❤️❤️❤️❤️❤️❤️</p>
        </div>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');
        const painelPrincipal = document.getElementById('painel-principal');
        const painelSucesso = document.getElementById('painel-sucesso');

        // Função que faz o botão "Não" fugir
        function foge() {
            // Remove o posicionamento inicial relativo ao centro
            btnNao.style.left = 'auto';
            
            // Calcula larguras e alturas da tela para o botão não sair dos limites visíveis
            const larguraTela = window.innerWidth - btnNao.offsetWidth - 40;
            const alturaTela = window.innerHeight - btnNao.offsetHeight - 40;

            // Gera posições aleatórias
            const aleatorioX = Math.floor(Math.random() * larguraTela) + 20;
            const aleatorioY = Math.floor(Math.random() * alturaTela) + 20;

            // Aplica a nova posição absoluta na tela inteira
            btnNao.style.position = 'fixed';
            btnNao.style.left = `${aleatorioX}px`;
            btnNao.style.top = `${aleatorioY}px`;
        }

        // Função executada quando clica em SIM
        function aceitou() {
            painelPrincipal.classList.add('hidden');
            painelSucesso.classList.remove('hidden');
            
            // Opcional: Lança confetes ou efeito se quiser expandir depois
            criarCoraçoes();
        }

        // Efeito extra: pequenos corações flutuando ao aceitar
        function criarCoraçoes() {
            for (let i = 0; i < 30; i++) {
                const coracao = document.createElement('div');
                coracao.innerHTML = '❤️';
                coracao.style.position = 'fixed';
                coracao.style.left = Math.random() * 100 + 'vw';
                coracao.style.top = '100vh';
                coracao.style.fontSize = Math.random() * 20 + 10 + 'px';
                coracao.style.animation = `subir ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(coracao);

                setTimeout(() => { coracao.remove(); }, 5000);
            }
        }

        // CSS dinâmico para a animação dos corações flutuantes
        const estiloAnimacao = document.createElement('style');
        estiloAnimacao.innerHTML = `
            @keyframes subir {
                to {
                    transform: translateY(-120vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(estiloAnimacao);
    </script>
</body>
</html>
